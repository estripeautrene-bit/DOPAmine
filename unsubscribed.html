<style>

  .logo span { color: #7B2FBE; }
  h1 { font-size: 22px; font-weight: 700; color: #06000D; margin: 0 0 12px; }
  p { font-size: 15px; color: #4A4650; line-height: 1.6; margin: 0; }

</style>

<body>
<div class="card">
  <div class="logo">My<span>Dopa</span>&#8482;</div>
  <h1>You're unsubscribed.</h1>
