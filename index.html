<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DOPAmine" />
  <meta name="theme-color" content="#06000D" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon.png" />
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <title>DOPAmine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #06000D;
      color: #E8D5FF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    #signInView, #forgotView {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
    }

    .si-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 48px;
    }
    .si-logo-d {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #7B2FBE, #B57BF7);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 900;
      color: white;
      font-style: italic;
      flex-shrink: 0;
    }
    .si-logo-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.3px;
    }
    .si-logo-name span { color: #B57BF7; font-weight: 400; }

    .si-headline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 36px;
      font-weight: 700;
      color: #E8D5FF;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 36px;
      width: 100%;
    }

    .si-input {
      width: 100%;
      background: #0E0B1A;
      border: 1px solid rgba(168,85,247,0.2);
      border-radius: 14px;
      padding: 20px 24px;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      color: #E8D5FF;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 12px;
    }
    .si-input::placeholder { color: rgba(201,190,216,0.45); }
    .si-input:focus { border-color: rgba(255,176,32,0.45); }

    .si-forgot {
      align-self: flex-end;
      background: none;
      border: none;
      color: #B57BF7;
      font-size: 0.8rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      padding: 0;
      margin-bottom: 28px;
    }
    .si-forgot:hover { text-decoration: underline; }

    .si-error {
      font-size: 0.82rem;
      color: #ff6b8a;
      min-height: 20px;
      text-align: center;
      margin-bottom: 12px;
      width: 100%;
    }
    .si-error.info { color: rgba(201,190,216,0.7); }

    .si-btn {
      background: transparent;
      border: 1px solid rgba(232,213,255,0.35);
      border-radius: 50px;
      padding: 16px 52px;
      font-size: 15px;
      font-weight: 500;
      color: #E8D5FF;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: transform 150ms ease-out, border-color 150ms ease-out;
      width: 100%;
      margin-bottom: 8px;
    }
    .si-btn:active { transform: scale(0.96); border-color: rgba(232,213,255,0.7); }
    .si-btn:focus { outline: none; }
    .si-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

    .si-new {
      font-size: 0.88rem;
      color: rgba(201,190,216,0.45);
      text-align: center;
      margin-top: 16px;
    }
    .si-new a { color: #B57BF7; text-decoration: none; font-weight: 600; }
    .si-new a:hover { text-decoration: underline; }

    .si-back {
      background: none;
      border: none;
      color: rgba(201,190,216,0.5);
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      padding: 0;
      margin-bottom: 32px;
      align-self: flex-start;
    }
    .si-back:hover { color: #E8D5FF; }
  </style>
</head>
<body>

  <div id="signInView">
    <div class="si-logo">
      <div class="si-logo-d">D</div>
      <div class="si-logo-name">DOPA<span>mine</span></div>
    </div>
    <h1 class="si-headline">Welcome back.</h1>
    <input class="si-input" type="email" id="siEmail" placeholder="Email" autocomplete="email" />
    <input class="si-input" type="password" id="siPassword" placeholder="Password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') signIn()" />
    <button class="si-forgot" onclick="showForgot()">Forgot password?</button>
    <div class="si-error" id="siError"></div>
    <button class="si-btn" id="siBtn" onclick="signIn()">Open app</button>
    <p class="si-new">New here? <a href="/app.html">Start your 7 days.</a></p>
  </div>

  <div id="forgotView">
    <div class="si-logo">
      <div class="si-logo-d">D</div>
      <div class="si-logo-name">DOPA<span>mine</span></div>
    </div>
    <h1 class="si-headline">Reset password.</h1>
    <button class="si-back" onclick="showSignIn()">← Back to sign in</button>
    <input class="si-input" type="email" id="resetEmail" placeholder="Email address" autocomplete="email"
      onkeydown="if(event.key==='Enter') sendReset()" />
    <div class="si-error" id="resetError"></div>
    <button class="si-btn" id="resetBtn" onclick="sendReset()">Send reset email</button>
  </div>

  <script>
    const SB_URL = 'https://qcfoykmmbjvduspunvsb.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjZm95a21tYmp2ZHVzcHVudnNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MTc1OTAsImV4cCI6MjA5Mjk5MzU5MH0.9WwCW0pbbciBy3sUO9Y6qpQK6-LclMCRUuF9cr_NEOE';
    const sbClient = supabase.createClient(SB_URL, SB_KEY);

    // Session check — redirect authenticated users straight to the app before anything renders
    (async () => {
      // DEBUG — remove once confirmed working
      const _dbg = document.createElement('p');
      _dbg.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#E8D5FF;font-family:"DM Sans",sans-serif;font-size:13px;padding:8px 18px;border-radius:20px;z-index:9999;white-space:nowrap;pointer-events:none;';
      document.body.appendChild(_dbg);

      const { data: { session }, error: sessionError } = await sbClient.auth.getSession();

      if (session) {
        _dbg.textContent = 'session found — redirecting';
        setTimeout(() => window.location.replace('/app.html'), 1500);
        return;
      }

      _dbg.textContent = sessionError ? 'error: ' + sessionError.message : 'no session detected';
      document.getElementById('signInView').style.display = 'flex';
    })();

    function showSignIn() {
      document.getElementById('forgotView').style.display = 'none';
      document.getElementById('signInView').style.display = 'flex';
    }

    function showForgot() {
      document.getElementById('signInView').style.display = 'none';
      document.getElementById('forgotView').style.display = 'flex';
    }

    async function signIn() {
      const email = document.getElementById('siEmail').value.trim();
      const password = document.getElementById('siPassword').value;
      const errEl = document.getElementById('siError');
      const btn = document.getElementById('siBtn');
      errEl.className = 'si-error';
      errEl.textContent = '';
      if (!email || !password) { errEl.textContent = 'Enter your email and password.'; return; }
      btn.disabled = true;
      btn.textContent = '…';
      const { error } = await sbClient.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Open app';
        return;
      }
      window.location.replace('/app.html');
    }

    async function sendReset() {
      const email = document.getElementById('resetEmail').value.trim();
      const errEl = document.getElementById('resetError');
      const btn = document.getElementById('resetBtn');
      errEl.className = 'si-error';
      errEl.textContent = '';
      if (!email) { errEl.textContent = 'Enter your email address.'; return; }
      btn.disabled = true;
      btn.textContent = '…';
      const { error } = await sbClient.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://mydopa.app/app.html'
      });
      btn.disabled = false;
      btn.textContent = 'Send reset email';
      if (error) { errEl.textContent = error.message; return; }
      errEl.className = 'si-error info';
      errEl.textContent = 'Check your inbox for the reset link.';
    }
  </script>
</body>
</html>
